# Instrumented UI smoke на эмуляторе (тяжелее обычного CI). PR + ручной запуск.
name: Android UI smoke

on:
  pull_request:
    paths:
      - "app/src/androidTest/**"
      - "app/src/main/**"
      - "app/build.gradle.kts"
      - "gradle/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ui-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            *.gradle.kts
            gradle/**/*.toml
            gradle/wrapper/**
            app/*.gradle.kts

      - uses: gradle/actions/wrapper-validation@v4

      - uses: android-actions/setup-android@v3

      - run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "emulator" "system-images;android-35;google_apis;x86_64"

      - name: Assemble debug + androidTest
        run: ./gradlew :app:assembleDebug :app:assembleDebugAndroidTest --no-daemon

      - name: AVD smoke (connectedSmokeDebugAndroidTest)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          target: google_apis
          script: ./gradlew :app:connectedSmokeDebugAndroidTest --no-daemon

      - name: Upload instrumented reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-ui-smoke-reports
          path: |
            app/build/reports/androidTests/
            app/build/outputs/androidTest-results/
